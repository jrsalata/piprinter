<!DOCTYPE html>
<html>

<head>
  <title>Custom Builder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="layout.css" type="text/css">
</head>

<body>
  <div class="page">
    <nav class="top-nav">
      <a href="/">&larr; Templates</a>
      <a href="/ticket">Quick Ticket</a>
    </nav>

    <h1>Custom Builder</h1>

    <div id="message"></div>

    % if 'status' in locals():
    <div class="status-bar">
      <span class="status-pill {{'status-ok' if status['ready'] else 'status-bad'}}" id="status-pill">
        <span class="status-dot"></span>
        {{'Printer Ready' if status['ready'] else 'Printer Offline'}}
      </span>
      <span class="status-pill">
        {{status['paper']}}
      </span>
    </div>
    % end

    <form id="builder-form">
      <div class="template-controls">
        <label>Template Name <span class="optional">(required to save)</span><br>
          <input type="text" id="template-name" placeholder="e.g. Grocery List">
        </label>
        <div class="template-controls-actions">
          <button type="button" id="save-new-btn" class="btn-secondary">Save Template</button>
          <button type="button" id="update-btn" class="btn-secondary" style="display:none;">Update Template</button>
          <button type="button" id="delete-btn" class="btn-danger" style="display:none;">Delete Template</button>
        </div>
      </div>

      <div id="add-block-row">
        <select id="block-type-select">
          <option value="title">Title</option>
          <option value="text" selected>Text</option>
          <option value="divider">Divider</option>
          <option value="newline">Blank Line</option>
          <option value="qr">QR Code</option>
          <option value="image">Image</option>
        </select>
        <button type="button" id="add-block-btn">Add Block</button>
      </div>

      <div id="block-list"></div>

      <button type="submit" id="print-btn" {{'disabled' if not status['ready'] else ''}}>Print</button>
    </form>
  </div>

  <template id="block-template">
    <div class="builder-block" draggable="false">
      <div class="builder-block-header">
        <strong class="block-type-label"></strong>
        <div class="builder-block-actions">
          <button type="button" class="move-up">&uarr;</button>
          <button type="button" class="move-down">&darr;</button>
          <button type="button" class="remove-block">Remove</button>
        </div>
      </div>

      <div class="block-fields"></div>

      <details class="style-panel">
        <summary>Style (optional)</summary>
        <div class="style-grid">
          <label>Align
            <select data-style="align">
              <option value="">&mdash;</option>
              <option value="left">left</option>
              <option value="center">center</option>
              <option value="right">right</option>
            </select>
          </label>
          <label>Font
            <select data-style="font">
              <option value="">&mdash;</option>
              <option value="a">a</option>
              <option value="b">b</option>
            </select>
          </label>
          <label>Bold
            <select data-style="bold" data-style-type="bool">
              <option value="">&mdash;</option>
              <option value="true">on</option>
              <option value="false">off</option>
            </select>
          </label>
          <label>Underline (0-2)
            <input type="number" data-style="underline" data-style-type="int" min="0" max="2">
          </label>
          <label>Invert
            <select data-style="invert" data-style-type="bool">
              <option value="">&mdash;</option>
              <option value="true">on</option>
              <option value="false">off</option>
            </select>
          </label>
          <label>Smooth
            <select data-style="smooth" data-style-type="bool">
              <option value="">&mdash;</option>
              <option value="true">on</option>
              <option value="false">off</option>
            </select>
          </label>
          <label>Flip
            <select data-style="flip" data-style-type="bool">
              <option value="">&mdash;</option>
              <option value="true">on</option>
              <option value="false">off</option>
            </select>
          </label>
          <label>Density (0-8)
            <input type="number" data-style="density" data-style-type="int" min="0" max="8">
          </label>
          <label>Normal text size
            <select data-style="normal_textsize" data-style-type="bool">
              <option value="">&mdash;</option>
              <option value="true">on</option>
              <option value="false">off</option>
            </select>
          </label>
          <label>Double width
            <select data-style="double_width" data-style-type="bool">
              <option value="">&mdash;</option>
              <option value="true">on</option>
              <option value="false">off</option>
            </select>
          </label>
          <label>Double height
            <select data-style="double_height" data-style-type="bool">
              <option value="">&mdash;</option>
              <option value="true">on</option>
              <option value="false">off</option>
            </select>
          </label>
          <label>Custom size
            <select data-style="custom_size" data-style-type="bool">
              <option value="">&mdash;</option>
              <option value="true">on</option>
              <option value="false">off</option>
            </select>
          </label>
          <label>Width (1-8, needs custom size)
            <input type="number" data-style="width" data-style-type="int" min="1" max="8">
          </label>
          <label>Height (1-8, needs custom size)
            <input type="number" data-style="height" data-style-type="int" min="1" max="8">
          </label>
        </div>
      </details>
    </div>
  </template>

  <template id="fields-text">
    <label>Text<br><textarea data-field="text" rows="3" placeholder="Text to print" required></textarea></label>
  </template>

  <template id="fields-title">
    <label>Title<br><input type="text" data-field="text" placeholder="Title" required></label>
  </template>

  <template id="fields-divider">
  </template>

  <template id="fields-newline">
    <label>Count<br><input type="number" data-field="count" min="1" value="1"></label>
  </template>

  <template id="fields-qr">
    <label>Data<br><input type="text" data-field="data" placeholder="URL or text to encode" required></label>
    <div class="field-row">
      <label>Size<br><input type="number" data-field="size" min="1" max="16" value="3"></label>
      <label class="checkbox-row"><input type="checkbox" data-field="center" checked> Center</label>
    </div>
  </template>

  <template id="fields-image">
    <label>Image<br><input type="file" accept="image/*" data-field="image"></label>
    <img class="image-preview" style="display:none;">
    <label class="checkbox-row"><input type="checkbox" data-field="center" checked> Center</label>
  </template>

  <script>
    const blockList = document.getElementById('block-list');
    const blockTemplate = document.getElementById('block-template');
    const typeLabels = { title: 'Title', text: 'Text', divider: 'Divider', newline: 'Blank Line', qr: 'QR Code', image: 'Image' };

    // data (optional) prefills a block's fields/style from a saved template,
    // e.g. { text: 'hi', style: { align: 'center' }, image: 'data:...' }
    function addBlock(type, data = {}) {
      const fieldsTemplate = document.getElementById('fields-' + type);
      if (!fieldsTemplate) {
        // Unknown block type (e.g. a hand-edited template file); skip it
        // rather than throwing and leaving the form half-populated.
        console.warn('Skipping unknown block type:', type);
        return;
      }

      const node = blockTemplate.content.cloneNode(true);
      const blockEl = node.querySelector('.builder-block');
      blockEl.dataset.type = type;
      blockEl.querySelector('.block-type-label').textContent = typeLabels[type] || type;

      blockEl.querySelector('.block-fields').appendChild(fieldsTemplate.content.cloneNode(true));

      for (const input of blockEl.querySelectorAll('[data-field]')) {
        const key = input.dataset.field;
        if (!(key in data)) continue;
        if (input.type === 'checkbox') {
          input.checked = !!data[key];
        } else if (input.type === 'file') {
          if (data[key]) {
            input.dataset.prefill = data[key];
            const preview = blockEl.querySelector('.image-preview');
            if (preview) {
              preview.src = data[key];
              preview.style.display = 'block';
            }
          }
        } else {
          input.value = data[key];
        }
      }

      blockEl.querySelectorAll('[data-field="image"]').forEach(input => {
        input.addEventListener('change', () => {
          const file = input.files[0];
          const preview = blockEl.querySelector('.image-preview');
          if (!file || !preview) return;
          delete input.dataset.prefill;
          readImageAsDataUrl(file).then(dataUrl => {
            preview.src = dataUrl;
            preview.style.display = 'block';
          });
        });
      });

      if (data.style && Object.keys(data.style).length) {
        for (const input of blockEl.querySelectorAll('[data-style]')) {
          const key = input.dataset.style;
          if (!(key in data.style)) continue;
          const kind = input.dataset.styleType;
          input.value = kind === 'bool' ? String(data.style[key]) : data.style[key];
        }
        blockEl.querySelector('.style-panel').open = true;
      }

      blockEl.querySelector('.move-up').addEventListener('click', () => {
        const prev = blockEl.previousElementSibling;
        if (prev) blockList.insertBefore(blockEl, prev);
      });
      blockEl.querySelector('.move-down').addEventListener('click', () => {
        const next = blockEl.nextElementSibling;
        if (next) blockList.insertBefore(next, blockEl);
      });
      blockEl.querySelector('.remove-block').addEventListener('click', () => blockEl.remove());

      blockList.appendChild(blockEl);
    }

    document.getElementById('add-block-btn').addEventListener('click', () => {
      addBlock(document.getElementById('block-type-select').value);
    });

    function loadBlocksIntoForm(blocks) {
      blockList.innerHTML = '';
      for (const block of blocks) {
        addBlock(block.type, block);
      }
    }

    function readImageAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function collectStyle(blockEl) {
      const style = {};
      blockEl.querySelectorAll('[data-style]').forEach(input => {
        const key = input.dataset.style;
        const kind = input.dataset.styleType;
        const raw = input.value;
        if (raw === '') return;
        if (kind === 'bool') style[key] = raw === 'true';
        else if (kind === 'int') style[key] = parseInt(raw, 10);
        else style[key] = raw;
      });
      return style;
    }

    async function collectBlocks() {
      const blocks = [];
      for (const blockEl of blockList.children) {
        const type = blockEl.dataset.type;
        const block = { type };
        const style = collectStyle(blockEl);
        if (Object.keys(style).length) block.style = style;

        for (const input of blockEl.querySelectorAll('[data-field]')) {
          const key = input.dataset.field;
          if (input.type === 'checkbox') {
            block[key] = input.checked;
          } else if (input.type === 'file') {
            const file = input.files[0];
            if (file) {
              block[key] = await readImageAsDataUrl(file);
            } else if (input.dataset.prefill) {
              block[key] = input.dataset.prefill;
            }
          } else if (input.type === 'number') {
            block[key] = parseInt(input.value, 10);
          } else {
            block[key] = input.value;
          }
        }

        if (type === 'image' && !block.image) {
          throw new Error('An image block is missing an image. Please choose a file.');
        }

        blocks.push(block);
      }
      return blocks;
    }

    const messageEl = document.getElementById('message');

    function showMessage(text, isError) {
      messageEl.innerHTML = `<div class="alert ${isError ? 'alert-error' : 'alert-success'}">
        <span class="alert-icon">${isError ? '&#10005;' : '&#10003;'}</span>
        <span>${text}</span>
      </div>`;
    }

    document.getElementById('builder-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const printBtn = document.getElementById('print-btn');
      printBtn.disabled = true;

      try {
        const blocks = await collectBlocks();
        if (!blocks.length) {
          showMessage('Add at least one block before printing.', true);
          return;
        }

        const res = await fetch('/builder', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ blocks }),
        });
        const result = await res.json();
        if (res.ok && result.success) {
          showMessage('Printed successfully!', false);
        } else {
          showMessage(result.error || 'Failed to print.', true);
        }
      } catch (err) {
        showMessage(err.message, true);
      } finally {
        printBtn.disabled = false;
      }
    });

    // --- Template CRUD (save/load/update/delete a named set of blocks) ---

    const nameInput = document.getElementById('template-name');
    const saveNewBtn = document.getElementById('save-new-btn');
    const updateBtn = document.getElementById('update-btn');
    const deleteBtn = document.getElementById('delete-btn');
    let currentTemplateId = null;

    function setEditingState(id) {
      currentTemplateId = id;
      updateBtn.style.display = id ? '' : 'none';
      deleteBtn.style.display = id ? '' : 'none';
      saveNewBtn.textContent = id ? 'Save as New Template' : 'Save Template';
    }

    // Disable the template action buttons while a request is in flight so a
    // double-click can't fire two overlapping saves/deletes.
    function setTemplateButtonsDisabled(disabled) {
      saveNewBtn.disabled = disabled;
      updateBtn.disabled = disabled;
      deleteBtn.disabled = disabled;
    }

    async function loadTemplate(id) {
      try {
        const res = await fetch(`/templates/${encodeURIComponent(id)}`);
        if (!res.ok) {
          showMessage('Template not found.', true);
          return;
        }
        const tmpl = await res.json();
        nameInput.value = tmpl.name;
        loadBlocksIntoForm(tmpl.blocks);
        setEditingState(tmpl.id);
      } catch (err) {
        showMessage(err.message, true);
      }
    }

    saveNewBtn.addEventListener('click', async () => {
      const name = nameInput.value.trim();
      if (!name) {
        showMessage('Enter a template name to save.', true);
        return;
      }

      setTemplateButtonsDisabled(true);
      try {
        const blocks = await collectBlocks();
        if (!blocks.length) {
          showMessage('Add at least one block before saving.', true);
          return;
        }

        const res = await fetch('/templates', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, blocks }),
        });
        const result = await res.json();
        if (res.ok) {
          showMessage('Template saved!', false);
          setEditingState(result.id);
          history.replaceState(null, '', `/builder?id=${result.id}`);
        } else {
          showMessage(result.error || 'Failed to save template.', true);
        }
      } catch (err) {
        showMessage(err.message, true);
      } finally {
        setTemplateButtonsDisabled(false);
      }
    });

    updateBtn.addEventListener('click', async () => {
      if (!currentTemplateId) return;
      const name = nameInput.value.trim();
      if (!name) {
        showMessage('Enter a template name to save.', true);
        return;
      }

      setTemplateButtonsDisabled(true);
      try {
        const blocks = await collectBlocks();
        if (!blocks.length) {
          showMessage('Add at least one block before saving.', true);
          return;
        }

        const res = await fetch(`/templates/${encodeURIComponent(currentTemplateId)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, blocks }),
        });
        const result = await res.json();
        if (res.ok) {
          showMessage('Template updated!', false);
        } else {
          showMessage(result.error || 'Failed to update template.', true);
        }
      } catch (err) {
        showMessage(err.message, true);
      } finally {
        setTemplateButtonsDisabled(false);
      }
    });

    deleteBtn.addEventListener('click', async () => {
      if (!currentTemplateId) return;
      if (!confirm('Delete this template? This cannot be undone.')) return;

      setTemplateButtonsDisabled(true);
      try {
        const res = await fetch(`/templates/${encodeURIComponent(currentTemplateId)}`, { method: 'DELETE' });
        if (res.ok) {
          showMessage('Template deleted.', false);
          nameInput.value = '';
          blockList.innerHTML = '';
          setEditingState(null);
          history.replaceState(null, '', '/builder');
        } else {
          const result = await res.json();
          showMessage(result.error || 'Failed to delete template.', true);
        }
      } catch (err) {
        showMessage(err.message, true);
      } finally {
        setTemplateButtonsDisabled(false);
      }
    });

    const initialTemplateId = new URLSearchParams(location.search).get('id');
    if (initialTemplateId) {
      loadTemplate(initialTemplateId);
    } else {
      setEditingState(null);
    }
  </script>
</body>

</html>
